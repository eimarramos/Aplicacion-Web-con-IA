<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}InstaClone{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Nunito+Sans:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #fafafa;
        --paper: #ffffff;
        --ink: #101011;
        --muted: #696b70;
        --line: #dbdbdd;
        --brand-a: #f58529;
        --brand-b: #dd2a7b;
        --brand-c: #8134af;
        --brand-d: #515bd4;
        --danger: #d92d43;
        --shadow: 0 18px 34px rgba(16, 16, 17, 0.07);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Nunito Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 8% 14%, #ffd9c3 0%, transparent 24%),
          radial-gradient(circle at 86% 9%, #f8c7e4 0%, transparent 20%),
          radial-gradient(circle at 88% 93%, #d4e3ff 0%, transparent 24%),
          var(--bg);
      }

      .top-bar {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(8px);
        background: rgba(255, 255, 255, 0.88);
      }

      .top-bar-inner {
        width: min(100%, 980px);
        margin: 0 auto;
        padding: 0.8rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo-link {
        text-decoration: none;
        color: inherit;
      }

      .logo {
        margin: 0;
        font:
          500 2rem/1 "Grand Hotel",
          cursive;
        letter-spacing: 0.02em;
      }

      .top-actions {
        display: flex;
        gap: 0.55rem;
        align-items: center;
      }

      .icon-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 2.15rem;
        height: 2.15rem;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--paper);
        font-size: 0.84rem;
        color: #333743;
        text-decoration: none;
        padding: 0 0.7rem;
      }

      .container {
        width: min(100%, 980px);
        margin: 0 auto;
        padding: 1.4rem 1rem 2rem;
      }

      .card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: var(--shadow);
      }

      .flash-list {
        margin-bottom: 0.9rem;
        display: grid;
        gap: 0.55rem;
      }

      .flash {
        padding: 0.72rem 0.9rem;
        border-radius: 12px;
        border: 1px solid #cde8d3;
        background: #eefbf1;
        color: #126734;
        box-shadow: var(--shadow);
      }

      .flash.warning {
        border-color: #fae3b8;
        background: #fff7e6;
        color: #7a5100;
      }

      .flash.error {
        border-color: #f8ced5;
        background: #fff2f5;
        color: #8f1f33;
      }

      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0.7rem 0.85rem;
        font: inherit;
        background: #fdfdfd;
        transition:
          border-color 180ms ease,
          box-shadow 180ms ease;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: #c7a2ff;
        box-shadow: 0 0 0 4px rgba(171, 116, 255, 0.14);
      }

      input::placeholder,
      textarea::placeholder {
        color: #8b8f98;
        opacity: 1;
      }

      button {
        border-radius: 999px;
        padding: 0.5rem 1rem;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        transition: transform 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        border: none;
        background: linear-gradient(
          90deg,
          var(--brand-a),
          var(--brand-b),
          var(--brand-c),
          var(--brand-d)
        );
        color: #fff;
      }

      .btn-danger {
        border: 1px solid #ffd0d7;
        background: #fff2f5;
        color: var(--danger);
      }

      .btn-link {
        border: 1px solid var(--line);
        background: #fff;
        color: #2f405a;
      }

      .error {
        color: var(--danger);
        font-size: 0.82rem;
        margin-top: 0.3rem;
      }

      .auth-shell {
        width: min(100%, 460px);
        margin: 2rem auto 0;
      }

      .auth-card {
        padding: 1.1rem;
      }

      .auth-title {
        margin: 0 0 0.7rem;
        font-size: 1.2rem;
      }

      .auth-footer {
        margin-top: 0.7rem;
        color: var(--muted);
        font-size: 0.87rem;
      }

      .auth-footer a {
        color: #244ecf;
        font-weight: 700;
        text-decoration: none;
      }

      .auth-footer a:hover {
        text-decoration: underline;
      }

      @media (max-width: 580px) {
        .top-bar-inner {
          padding-inline: 0.65rem;
        }

        .logo {
          font-size: 1.8rem;
        }

        .container {
          padding-inline: 0.55rem;
        }
      }
    </style>
    {% block head_extra %}{% endblock %}
  </head>
  <body>
    {% include "components/topbar.html" %}
    <main class="container">
      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div class="flash-list">
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %} {% endwith %} {% block content %}{% endblock %}
    </main>
  </body>
</html>
