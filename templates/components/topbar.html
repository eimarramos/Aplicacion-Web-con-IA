<header class="top-bar">
  <div class="top-bar-inner">
    <a class="logo-link" href="{{ url_for('feed.index') }}">
      <h1 class="logo">InstaClone</h1>
    </a>
    <div class="top-actions">
      {% if current_user.is_authenticated %} {% if current_user.avatar_url %}
      <img
        src="{{ current_user.avatar_url }}"
        alt="Avatar de {{ current_user.display_name or current_user.username }}"
        class="top-avatar"
      />
      {% else %}
      <span class="top-avatar top-avatar-fallback"
        >{{ (current_user.display_name or current_user.username)[0]|upper
        }}</span
      >
      {% endif %}
      <a class="icon-pill" href="{{ url_for('auth.edit_profile') }}">Perfil</a>
      <span class="icon-pill top-user-name"
        >{{ current_user.display_name or current_user.username }}</span
      >
      <a class="icon-pill" href="{{ url_for('auth.logout') }}">Salir</a>
      {% else %}
      <a class="icon-pill" href="{{ url_for('auth.login') }}">Login</a>
      <a class="icon-pill" href="{{ url_for('auth.register') }}">Registro</a>
      {% endif %}
    </div>
  </div>
</header>
